service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      exporters: [prometheusremotewrite]

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prisma_metrics'
          scrape_interval: 10s
          metrics_path: /prisma_metrics
          dns_sd_configs:
            - names:
                - api
              type: A
              port: 3100

exporters:
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
