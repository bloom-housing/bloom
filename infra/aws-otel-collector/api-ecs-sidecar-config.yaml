receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prisma_metrics'
          scrape_interval: 10s
          metrics_path: /prisma_metrics
          static_config:
            - targets: ['0.0.0.0:3100']

exporters:
  prometheusremotewrite:
    endpoint: ${env:PROMETHEUS_REMOTE_WRITE_ENDPOINT}

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      exporters: [prometheusremotewrite]
