receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prisma_metrics'
          scrape_interval: 10s
          metrics_path: /prisma_metrics
          static_configs:
            - targets: ['0.0.0.0:3100']

extensions:
  sigv4auth:
    service: "aps"

exporters:
  prometheusremotewrite:
    endpoint: ${env:PROMETHEUS_REMOTE_WRITE_ENDPOINT}
    auth:
      authenticator: sigv4auth

service:
  extensions: [sigv4auth]
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      exporters: [prometheusremotewrite]
